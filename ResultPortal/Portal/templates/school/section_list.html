{% extends "base.html" %}
{% block content %}

<div class="p-6">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-bold">Sections</h1>
        <a href="{% url 'add_section' %}" class="bg-blue-600 text-white px-4 py-2 rounded">
            Add Class
        </a>
    </div>

    <table class="w-full border border-gray-300">
        <thead class="bg-gray-100">
            <tr>
                <th class="border p-2">Class </th>
                <th class="border p-2">Section</th>
                <th class="border p-2">Action</th>
            </tr>
        </thead>
        <tbody>
            {% for s in section %}
            <tr>
                <td class="border p-2">{{ s.class_ref}}</td>
                <td class="border p-2">{{ s.section_list}}</td>
                <td class="border p-2">
                    <a href="{% url 'edit_section' s.id %}" class="text-blue-600">Edit</a>
                    |
                    <a href="{% url 'delete_section' s.id %}" class="text-red-600">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="6" class="border p-2 text-center">No section found</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
