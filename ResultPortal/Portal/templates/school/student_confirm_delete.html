{% extends "base.html" %}
{% block content %}

<div class="max-w-lg mx-auto mt-10 bg-white shadow rounded p-6">
    <h2 class="text-xl font-bold mb-4">Delete Student</h2>
    <p>Are you sure you want to delete <strong>{{ student.name }}</strong>?</p>

    <form method="POST" class="mt-4">
        {% csrf_token %}
        <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded">Yes, Delete</button>
        <a href="{% url 'student_list' %}" class="ml-2 bg-gray-400 text-white px-4 py-2 rounded">Cancel</a>
    </form>
</div>

{% endblock %}
